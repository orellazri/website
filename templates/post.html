{% extends "base.html" %} {% block title %}{{ post.front.title }}{% endblock %}
{% block content %}
<article>
  <h1>{{ post.front.title }}</h1>
  <time>{{ post.front.date }}</time>
  <div class="tags">
    {% for tag in post.front.tags %}
    <a href="/tags/{{ tag }}">{{ tag }}</a>
    {% endfor %}
  </div>
  <div class="content">{{ post.html | safe }}</div>
</article>
{% endblock %}
