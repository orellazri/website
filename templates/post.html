{% extends "base.html" %}

{% block title %}{{ post.front.title }}{% endblock %}

{% block content %}
<article>
  <h1>{{ post.front.title }}</h1>
  <div class="post-subtitle">
    <time>{{ post.front.date }}</time>
    <ul class="post-tags">
      {% for tag in post.front.tags %}
      <li><a href="/tags/{{ tag }}">{{ tag }}</a></li>
      {% endfor %}
    </ul>
  </div>
  {{ post.html | safe }}
</article>
{% endblock %}
