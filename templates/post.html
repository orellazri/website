{% extends "base.html" %}

{% block title %}{{ post.front.title }}{% endblock %}

{% block content %}
<article>
  <h1>{{ post.front.title }}</h1>
  <time>{{ post.front.date }}</time>
  <div class="post-tags">
    {% for tag in post.front.tags %}
    <a href="/tags/{{ tag }}">{{ tag }}</a>
    {% endfor %}
  </div>
  {{ post.html | safe }}
</article>
{% endblock %}
