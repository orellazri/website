{% extends "base.html" %}

{% block title %}Posts{% endblock %}

{% block content %}
<h1>Posts</h1>
<ul>
  {% for post in posts %}
  <li>
    <a href="/posts/{{ post.slug }}/">{{ post.front.title }}</a>
    <time datetime="{{ post.front.date }}">{{ post.front.date }}</time>
  </li>
  {% endfor %}
</ul>
{% endblock %}
