{% extends "base.html" %}

{% block title %}Posts tagged "{{ tag }}"{% endblock %}

{% block content %}
<section>
  <h1>Posts tagged "{{ tag }}"</h1>
  <ul class="post-list">
    {% for post in posts %}
    <li>
      <a href="/posts/{{ post.slug }}/">{{ post.front.title }}</a>
      <time datetime="{{ post.front.date }}">{{ post.front.date }}</time>
    </li>
    {% endfor %}
  </ul>
</section>
{% endblock %}
